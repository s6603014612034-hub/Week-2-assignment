<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Control Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-on {
            background-color: #2ecc71;
            color: white;
        }
        .btn-on:hover {
            background-color: #27ae60;
        }
        .btn-off {
            background-color: #e74c3c;
            color: white;
        }
        .btn-off:hover {
            background-color: #c0392b;
        }
        .status-box {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>ESP32 Control</h2>
        <p>ควบคุม Output Pin 1</p>
        
        <button class="btn btn-on" onclick="togglePin('on')">เปิดไฟ (ON)</button>
        <button class="btn btn-off" onclick="togglePin('off')">ปิดไฟ (OFF)</button>
        
        <div class="status-box" id="status">สถานะ: รอการสั่งการ</div>
    </div>

    <script>
        function togglePin(action) {
            document.getElementById('status').innerText = 'กำลังส่งคำสั่ง...';
            
            // ส่ง Request ไปยัง ESP32 ตาม Endpoint ที่กำหนด
            fetch('/pin1/' + action)
                .then(response => {
                    if (response.ok) {
                        document.getElementById('status').innerText = 'สถานะ: ทำงานสำเร็จ (' + action.toUpperCase() + ')';
                    } else {
                        document.getElementById('status').innerText = 'สถานะ: เกิดข้อผิดพลาด!';
                    }
                })
                .catch(error => {
                    document.getElementById('status').innerText = 'สถานะ: ไม่สามารถเชื่อมต่อกับ ESP32 ได้';
                    console.error('Error:', error);
                });
        }
    </script>

</body>
</html>
