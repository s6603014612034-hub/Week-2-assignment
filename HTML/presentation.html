<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ส่วนตัวของฉัน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 450px;
            text-align: center;
        }
        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            border-radius: 50%;
            border: 3px solid #007bff;
            overflow: hidden;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            color: #007bff;
            margin-top: 15px;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img-container">
            <img src="107907.jpg" alt="รูปโปรไฟล์" class="profile-img">
        </div>
        
        <h1>เปี่ยมโชค เพ็ชรผ่อง</h1>
        <p style="font-weight: bold; color: #666;">Web Developer </p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <p style="text-align: left;">
            <strong>เกี่ยวกับฉัน:</strong> สวัสดีครับ! ชมรมคนชอบผี
        </p>
        
        <a href="https://www.facebook.com/chokdee.piamchok?locale=th_TH" target="_blank" class="btn">เยี่ยมชม Facebook ของฉัน</a>
    </div>

</body>
</html>
